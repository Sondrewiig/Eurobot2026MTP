overhead_rectifier_node:
  ros__parameters:
    board_width_mm: 3000
    board_height_mm: 2000
    tag_size_mm: 100

    image_topic: /overhead_cam/image
    camera_info_topic: /overhead_cam/camera_info
    warped_topic: /vision/board_warped
    debug_topic: /vision/board_debug
    robot_pose_topic: /vision/robot_pose

    cache_h_seconds: 0.75

    fixed_ids: [20, 21, 22, 23]
    fixed_x_mm: [600.0, 2400.0, 600.0, 2400.0]
    fixed_y_mm: [1400.0, 1400.0, 600.0, 600.0]
    fixed_yaw_deg: [0.0, 0.0, 0.0, 0.0]

    robot_tag_id: 71
    robot_tag_size_m: 0.10
    robot_tag_yaw_offset_deg: 0.0
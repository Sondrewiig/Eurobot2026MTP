pose_fuser:
  ros__parameters:
    odom_topic: "/odom"
    imu_topic: "/imu"
    aruco_topic: "/bot_pose_estimate"
    overhead_topic: "/vision/robot_pose"
    fused_topic: "/bot_pose_fused"
    status_topic: "/localization_status"

    publish_rate: 20.0
    aruco_timeout: 0.35
    overhead_timeout: 0.5

    # Spawn pose in world/arena frame.
    # sim.launch.py overrides these from control_tuning.yaml.
    spawn_x_m: 0.3
    spawn_y_m: 1.8
    spawn_yaw_rad: -1.5707963267948966

    # In the current Gazebo setup, /imu yaw starts at 0 deg at spawn even when
    # the robot starts at -90 deg in the arena. Keep this true for that case.
    # If /imu later starts directly at arena/world yaw, set this false.
    imu_yaw_relative_to_spawn: true
    imu_yaw_offset_deg: 0.0

    # In the current Gazebo DiffDrive setup, /odom pose is relative to the spawn
    # odom frame, so x/y must be rotated by spawn_yaw and translated by spawn x/y.
    # If /odom pose is later published directly in arena/world coordinates, set false.
    odom_pose_relative_to_spawn: true
    odom_xy_yaw_offset_deg: 0.0

    # Reject single-frame ArUco teleports, but allow reacquisition after dropout.
    aruco_gate_distance_m: 0.45
    aruco_gate_yaw_deg: 45.0
    aruco_reacquire_s: 1.0

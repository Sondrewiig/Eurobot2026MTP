overhead_rectifier_node:
  ros__parameters:
    # Team selection: 'yellow' or 'blue'
    # Determines overhead camera position used for parallax correction.
    team: yellow

    board_width_mm: 3000
    board_height_mm: 2000
    tag_size_mm: 100

    image_topic: /overhead_cam/image
    camera_info_topic: /overhead_cam/camera_info
    warped_topic: /vision/board_warped
    debug_topic: /vision/board_debug
    robot_pose_topic: /vision/robot_pose
    enemy_pose_topic: /vision/enemy_pose

    cache_h_seconds: 5.0

    fixed_ids: [20, 21, 22, 23]
    fixed_x_mm: [600.0, 2400.0, 600.0, 2400.0]
    fixed_y_mm: [1400.0, 1400.0, 600.0, 600.0]
    fixed_yaw_deg: [0.0, 0.0, 0.0, 0.0]

    # sim.launch.py overrides this from control_tuning.yaml/team/aruco_tags.
    # Default here matches the default blue active robot tag.
    robot_tag_id: 1
    # sim.launch.py overrides this to the opposite team range.
    # blue active robot -> enemy IDs 6-10; yellow active robot -> enemy IDs 1-5.
    enemy_tag_ids: [6, 7, 8, 9, 10]
    robot_tag_size_m: 0.10
    robot_tag_yaw_offset_deg: 0.0

    use_dynamic_camera_center: true

    # fallback values if dynamic center estimation is bad/unavailable
    camera_center_x_mm: 1400.0
    camera_center_y_mm: 1000.0
    camera_height_m: 2.20

    # height of the robot/opponent top ArUco tag above the board in the sim
    robot_tag_height_m: 0.405

    # Parallax correction for raised robot/opponent top tags.
    # Required in simulation too: the homography is fitted to board tags on
    # z=0, while the robot tags are on top of the bots.
    apply_parallax_correction: true

    # empirical yaw bias correction as function of x-position
    apply_yaw_bias_correction: false
    yaw_bias_center_x_mm: 1400.0
    yaw_bias_linear_deg_per_m: 0.0
    yaw_bias_cubic_deg_per_m3: 0.0

    # Offset from tag center to wheel axis in robot frame.
    # The tag is 100mm forward of the wheel axis in the SDF,
    # so subtract 100mm along heading to get the axis position.
    tag_to_robot_forward_m: -0.10
    tag_to_robot_right_m: 0.0